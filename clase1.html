   <!-- -->  <!-- Esto es un comentario en HTML y no se verá en la página. -->
<!-- Estas son las primeras etiquetas para poder crear un archivo HTML: -->


<!DOCTYPE html>  <!-- Esto es lo Primero de todo. Declaración de 
                    tipo:Indica que es un documento HTML5. -->

<html>      <!-- Esta es la Raiz, es la “caja principal” de la página-->

<head>      <!-- Esta es la estiqueta de apertura de cabecera de la pagina, no se aprecia en la pagina pero en la pestaña si -->      
    
    <title> Mi primera pagina</title>       <!-- Esta es la etiqueta de titulo, tiene apertura y cierre y en el centro
                                                se detalla el titulo que queramos para la pagina..  -->

</head>     <!-- Esta es la etiqueta de cierre de la cabecera de la pagina se logra diferenciar por el "/"-->

<body>      <!-- Esta etiqueta es para denominar el cuerpo principal de la pagina. -->

    <h1>Hola mundo, esto es un h1</h1>       <!-- Esta etiqueta es para un subtitulo despues de agragar el titulo,
                                                estos se dividen en h1, h2, h3, ect... cada vez van siendo subtitulos
                                                o subtemas y son mas pequeños conforme aumentemos el numero del "h"
                                                Ejem: el h1 tiene un tamaño mas grande que esl h4. -->
    
    <hr>       <!-- Con esta etiqueta poddemos crear una linea divisora, logrando asi segmentar bloques de informacion o imagenes-->
    
    <p>Esta zona(p) se usa para escribir parrafo </p>       <!--Esta etiqueta tiene como funcion de incluir contenido
                                                                como por ejemplo informacion de un tema o una redaccion 
                                                                en forma de parrafo.-->                                                            <br>
    
     <br>  <!-- Esta etiqueta no contiene cierre y funciona para separar texto dejando asi un espacio en blanco entre etiquetas -->
    
    
   
    <h2> este es un h2, osea un titulo o subtitulo </h2>    <!-- La etiqueta h2 es otro ejemplo para colocar un subtitulo mas pequeño
                                                                siendo asi un subtema -->
    
    
             <!-- Hay otras etiquetas que su funcion es remarcar texto importante
              por ejemplo <strong> aqui va texto marcado en negrita </strong> o bien:<b></b>
              tambien esta la etiqueta: <mark>aqui va el texto marcado en amarillo</mark>  -->
    
    <p><mark>ATENCION!!</mark>Este es un mensaje <strong>muy importante( esto es un ejemplo de la etiqueta strong)</strong>.</p>
    
    
</body>    <!-- Este es el cierre del cuerpo de pagina se diferencia por el "/" -->

</html>     <!-- Este es el cierre del archivo de html, es cuando finalmente terminamos de escribir todo el codigo se diferencia por el "/"  -->
